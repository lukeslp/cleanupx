:"local.component.BlankItem","config":{"w":100,"h":2300,"x":0,"y":0,"i":"63424662-22e7-487e-a3c6-d34d71dada3b","moved":false,"static":false,"isDraggable":true,"isResizable":true},"children":[{"type":"Component","id":"ArcoText","name":"文字","icon":"https:\u002F\u002Flf3-cdn-tos.huoshanstatic.com\u002Fobj\u002Farcosites\u002Fcomponent-text.svg","_icon":"https:\u002F\u002Flf3-cdn-tos.huoshanstatic.com\u002Fobj\u002Farcosites\u002Fcomponent-text-icon.svg","componentType":"local.component.Text","props":{"value":{"t":{"0":{"ops":[{"attributes":{"lmkr":"1","align":"left","ol-id":"28VihAV4"},"insert":"*"},{"insert":"Coze is a next-generation AI application and chatbot development platform. Regardless of your programming experience, Coze enables you to effortlessly create various chatbots and deploy them across different social platforms and messaging apps.\n"},{"attributes":{"align":"left","lmkr":"1","ol-id":"28VihAV4"},"insert":"*"},{"insert":"Coze allows you to publish your bot as an API service to integrate "},{"attributes":{"grammarly-data":"{\"id\":\"f04c4274-a8dc-4a6f-94e5-ffc0c960adfd\",\"operation\":\"replace\",\"origin_text\":\"to\",\"replace_text\":\"into\",\"rule_id\":\"1004\",\"rule_description\":\"Possible Grammar Issue@2024060716385780AB5BC90C967601EC2D@en@68@0\",\"is_ignore\":0}"},"insert":"to"},{"insert":" your applications. You can make an HTTP request to interact with the created AI chatbot.\n"},{"attributes":{"anchor":"e0b65e13","heading":"h1","lmkr":"1","align":"left","ol-id":"28VihAV4"},"insert":"*"},{"insert":"Limits\n"},{"attributes":{"lmkr":"1"},"insert":"*"},{"insert":"The rate limit of the Coze "},{"insert":"chat","attributes":{"inlineCode":"true"}},{"insert":" API is related to the accumulated number of Coze tokens.\n"},{"attributes":{"lmkr":"1"},"insert":"*"},{"attributes":{"aceTable":"rsy6qbgwk9ib03d72m5jj1kmmwe1z1b334 csbsis6g7woviqgmgc1q0wfndw54iaowfv"},"insert":"*"},{"insert":"\n"},{"attributes":{"anchor":"7d5b3d25","lmkr":"1","heading":"h1"},"insert":"*"},{"insert":"Pricing\n"},{"attributes":{"lmkr":"1"},"insert":"*"},{"insert":"When calling a Coze API, it will consume tokens if LLM is used. After the free token quota is used, you can purchase tokens on the "},{"attributes":{"hyperlink":"{\"href\":\"https:\u002F\u002Fwww.coze.com\u002Ftoken\",\"linkId\":\"SMl9QKvdPb\",\"newTab\":true}"},"insert":"Coze Token"},{"insert":" page. For more information, refer to "},{"attributes":{"dataMetaBlockProps":"{\"blockId\":\"67cfa0ce-f7dd-4623-9d7b-6885626bb6a7\",\"blockType\":\"mentionBlock\",\"props\":{\"link\":\"unknown\",\"type\":1,\"title\":\"Manage tokens\",\"token\":\"65b0b9325c77d50495c70e91\",\"displayMode\":\"inline\"},\"initData\":\"%7B%7D\"}"},"insert":" "},{"insert":".\n"},{"insert":"Coze provides a free API call quota for all registered users, of which the free quotas for API services and SDK services are accumulated separately. The free quota for the API service is 30 Coze API calls, and the deduction of the free quota includes all APIs of all bots under the current account, regardless of whether these APIs consume tokens. If your API call count exceeds 30 times, Coze will deduct tokens based on the actual number of tokens consumed by API calls.\n"},{"attributes":{"anchor":"c7643a64","heading":"h1","lmkr":"1"},"insert":"*"},{"insert":"Make a request\n"},{"attributes":{"lmkr":"1"},"insert":"*"},{"insert":"You can paste the command below into your terminal to run your first API request.\n"},{"attributes":{"lmkr":"1"},"insert":"*"},{"insert":"Replace the following values before running the command:\n"},{"attributes":{"lmkr":"1","list":"bullet1"},"insert":"*"},{"attributes":{"wrap":"true"},"insert":"Authorization"},{"insert":": The personal access token used for authentication. Click "},{"attributes":{"hyperlink":"{\"href\":\"https:\u002F\u002Fwww.coze.com\u002Fopen\u002Fapi\",\"linkId\":\"4AJnqvqQAU\",\"newTab\":true}"},"insert":"here"},{"insert":" to generate your personal access token.\n"},{"attributes"
